@if (matches.isLoading() || bets.isLoading()) {
  <p>Loading upcoming matches...</p>
} @else if (matches.error() || bets.error()) {
  <p class="text-red-500">Error loading matches: {{ matches.error() || bets.error() }}</p>
} @else {
  <div class="flex flex-col gap-8">
    @for ((match of matches.value() || []); track match.id) {
      <match-card [match]="match" [bet]="getBetForMatch(match.id)"></match-card>
    }
  </div>
}
