@if (matchesPage.isLoading()) {
  <div class="flex flex-col gap-8" aria-hidden="true">
    @for (i of [0, 1, 2, 3, 4]; track i) {
      <match-card-skeleton></match-card-skeleton>
    }
  </div>
  <p class="sr-only">{{ 'matches.loading' | transloco }}</p>
} @else if (matchesPage.error()) {
  <p class="text-red-500">{{ 'matches.error' | transloco }}</p>
} @else {
  <div class="flex flex-col gap-4">
    <match-stage-filter
      [activeStage]="activeStage()"
      (stageChange)="onStageChange($event)"
    ></match-stage-filter>

    <!-- Matches list -->
    <div class="flex flex-col gap-8">
      @for (match of filteredMatches(); track match.id) {
        <match-card [match]="match" [bet]="getBetForMatch(match)"></match-card>
      } @empty {
        <p class="text-sm opacity-60 text-center py-8">{{ 'matches.noResults' | transloco }}</p>
      }
    </div>
  </div>
}
