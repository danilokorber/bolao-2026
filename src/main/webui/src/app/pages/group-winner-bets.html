<div class="flex flex-col gap-6">
  <div class="flex flex-row">
    <h1 class="flex-1 text-xl sm:text-2xl font-bold text-primary-700">
      {{ 'groupWinnerBets.title' | transloco }}
    </h1>
    <button (click)="next()">{{ 'buttons.continue' | transloco }}</button>
  </div>
  <p class="text-sm text-gray-500">{{ 'groupWinnerBets.subtitle' | transloco }}</p>

  @if (teams.isLoading() || userBets.isLoading()) {
    <p>{{ 'groupWinnerBets.loading' | transloco }}</p>
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      @for (group of groups(); track group.groupName) {
        <group-bet-card
          [groupName]="group.groupName"
          [label]="group.label"
          [teams]="group.teams"
          [initialFirst]="group.firstPlaceTeamId"
          [initialSecond]="group.secondPlaceTeamId"
          [locked]="group.locked"
        ></group-bet-card>
      }
    </div>
  }
</div>
