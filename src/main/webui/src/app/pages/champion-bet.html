<div class="flex flex-col gap-6">
  <div class="flex flex-row">
    <h1 class="flex-1 text-xl sm:text-2xl font-bold text-primary-700">
      {{ 'championBet.title' | transloco }}
    </h1>
    <button (click)="next()">{{ 'buttons.continue' | transloco }}</button>
  </div>
  <p class="text-sm text-gray-500">{{ 'championBet.subtitle' | transloco }}</p>

  @if (teams.isLoading() || !betLoaded()) {
    <p>{{ 'championBet.loading' | transloco }}</p>
  } @else {
    <champion-bet-form
      mode="card"
      [teams]="allTeams()"
      [bet]="betValue()"
      [locked]="locked()"
    ></champion-bet-form>
  }
</div>
